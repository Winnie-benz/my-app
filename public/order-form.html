<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claim or Defect</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    .container { width: 100%; max-width: 720px; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    /* ── Loading overlay ── */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(240,242,245,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 14px;
    }

    #loadingOverlay.hidden { display: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #dde1ea;
      border-top-color: #4f7ef8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      will-change: transform;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 14px; color: #666; font-weight: 500; }

    #loadError {
      background: #fff3e0;
      border: 1.5px solid #ffb74d;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
      display: none;
      font-size: 13px;
      color: #e65100;
    }

    #loadError button {
      margin-left: 12px;
      padding: 4px 12px;
      background: #e65100;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    /* ── Panels ── */
    .panel {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 20px 24px;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      margin-bottom: 14px;
    }

    /* ── Row ── */
    .row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .field label { font-size: 13px; font-weight: 600; color: #333; }

    .field input[type="text"],
    .field input[type="number"] {
      height: 44px;
      border: 1.5px solid #dde1ea;
      border-radius: 9px;
      padding: 0 14px;
      font-size: 15px;
      color: #1a1a2e;
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
      background: #fafbfd;
      width: 100%;
    }

    .field input:focus {
      border-color: #4f7ef8;
      box-shadow: 0 0 0 3px rgba(79,126,248,0.12);
      background: #fff;
    }

    .field input.error  { border-color: #e74c3c; }
    .field input.success { border-color: #27ae60; }

    .hint { font-size: 11.5px; color: #aaa; margin-top: 1px; }

    /* ── Status badges (shop name / product name) ── */
    .status-badge {
      font-size: 13px;
      font-weight: 600;
      padding: 5px 11px;
      border-radius: 7px;
      display: none;
      margin-top: 2px;
    }

    .status-badge.found     { background: #e8f5e9; color: #2e7d32; display: block; }
    .status-badge.not-found { background: #fff3e0; color: #e65100; display: block; }

    /* ── JAN row ── */
    .field-jan      { flex: 2; }
    .field-qty      { flex: 0.8; }
    .field-reason   { flex: 2; }
    .field-tracking { max-width: 320px; }

    .add-btn {
      margin-top: 26px;
      height: 44px;
      padding: 0 20px;
      background: #4f7ef8;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-btn:hover  { background: #3a65d6; }
    .add-btn:active { transform: scale(0.96); }

    /* ── Order list ── */
    .order-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 4px;
    }

    .order-list:empty::before {
      content: 'ยังไม่มีรายการ';
      display: block;
      text-align: center;
      color: #bbb;
      font-size: 13px;
      padding: 16px 0 8px;
    }

    .order-item {
      display: flex;
      align-items: center;
      background: #f7f8fc;
      border: 1.5px solid #e8eaf0;
      border-radius: 10px;
      padding: 10px 14px;
      gap: 12px;
      animation: slideIn 0.18s ease;
      will-change: opacity, transform;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-index { font-size: 12px; font-weight: 700; color: #aaa; min-width: 22px; }
    .item-info  { flex: 1; }
    .item-name  { font-size: 14px; font-weight: 600; color: #1a1a2e; }
    .item-meta  { font-size: 12px; color: #888; margin-top: 2px; }
    .item-qty   { font-size: 14px; font-weight: 700; color: #4f7ef8; min-width: 60px; text-align: right; }

    .del-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .del-btn:hover { color: #e74c3c; background: #fde8e8; }

    /* ── Submit ── */
    .submit-btn {
      width: 100%;
      height: 50px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.18s, transform 0.1s;
    }

    .submit-btn:hover    { background: #2e2e50; }
    .submit-btn:active   { transform: scale(0.98); }
    .submit-btn:disabled { background: #c5c9d6; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform 0.25s ease;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    .divider { height: 1px; background: #eef0f5; margin: 16px 0; }

    @media (max-width: 480px) {
      .row { flex-wrap: wrap; }
      .field-jan, .field-qty { flex: unset; width: 100%; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">กำลังโหลดข้อมูลสาขาและสินค้า...</div>
</div>

<div class="container">
  <h1>Claim or Defect</h1>

  <!-- Error banner -->
  <div id="loadError">
    ไม่สามารถโหลดข้อมูลได้ กรุณาตรวจสอบการเชื่อมต่อ
    <button onclick="loadData()">ลองอีกครั้ง</button>
  </div>

  <!-- ── Top panel: Location + Submitted By ── -->
  <div class="panel">
    <div class="panel-title">Store Information</div>
    <div class="row">

      <div class="field">
        <label for="location">Location (รหัสร้านค้า)</label>
        <input
          type="text"
          id="location"
          placeholder="เช่น 101, 1023"
          maxlength="4"
          inputmode="numeric"
          autocomplete="off"
        />
        <div id="shopName" class="status-badge"></div>
        <span class="hint">ตัวเลข 3-4 หลัก</span>
      </div>

      <div class="field">
        <label for="employeeId">Submitted By (รหัสพนักงาน)</label>
        <input
          type="text"
          id="employeeId"
          placeholder="เช่น 10234"
          maxlength="5"
          inputmode="numeric"
          autocomplete="off"
        />
        <span class="hint">ตัวเลข 4-5 หลัก</span>
      </div>

    </div>

    <div class="divider"></div>

    <div class="field field-tracking">
      <label for="trackingNo">Tracking Order</label>
      <input
        type="text"
        id="trackingNo"
        placeholder="เลข Tracking (ไม่บังคับ)"
        autocomplete="off"
      />
    </div>

  </div>

  <!-- ── Bottom panel: Add items ── -->
  <div class="panel">
    <div class="panel-title">เพิ่มรายการสินค้า</div>

    <div class="row">
      <div class="field field-jan">
        <label for="jan">JAN (รหัสสินค้า)</label>
        <input
          type="text"
          id="jan"
          placeholder="กรอกรหัส 13 หลัก"
          maxlength="13"
          inputmode="numeric"
          autocomplete="off"
        />
        <div id="productName" class="status-badge"></div>
        <span class="hint">ตัวเลข 13 หลัก (EAN-13)</span>
      </div>

      <div class="field field-qty">
        <label for="qty">Quantity (กล่อง)</label>
        <input type="number" id="qty" placeholder="0" min="1" autocomplete="off" />
      </div>

      <div class="field field-reason">
        <label for="reason">สาเหตุ</label>
        <input type="text" id="reason" placeholder="ระบุสาเหตุ" autocomplete="off" />
      </div>

      <button type="button" class="add-btn" onclick="addItem()" title="เพิ่มรายการ">+</button>
    </div>

    <div class="divider"></div>

    <div class="panel-title">รายการที่เพิ่มแล้ว</div>
    <div class="order-list" id="orderList"></div>
  </div>

  <!-- Submit -->
  <button type="button" class="submit-btn" id="submitBtn" onclick="submitOrder()" disabled>
    Submit Order
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxf1smTztNJtjmQ0-M7akCUn_VHkqI8eb7knNvuv0WX57BUFo587uDa49ft1odq6b4J/exec';

  let SHOPS      = {};
  let PRODUCTS   = {};
  let orderItems = [];

  async function loadData() {
    document.getElementById('loadingOverlay').classList.remove('hidden');
    document.getElementById('loadError').style.display = 'none';
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=init`);
      const data = await res.json();
      SHOPS    = data.shops    || {};
      PRODUCTS = data.products || {};
      document.getElementById('loadingOverlay').classList.add('hidden');
    } catch (err) {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('loadError').style.display = 'block';
      console.error('Load error:', err);
    }
  }

  // Shared handler for digit-only inputs that look up a name from a dict on each keystroke.
  // getDict is a function so callers always read the latest SHOPS/PRODUCTS after loadData().
  function bindLookupInput(inputId, badgeId, getDict, isValid, notFoundMsg) {
    document.getElementById(inputId).addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '');
      const el   = document.getElementById(badgeId);
      const val  = this.value;
      if (isValid(val)) {
        const name = getDict()[val];
        if (name) {
          el.textContent = '✓ ' + name;
          el.className   = 'status-badge found';
          this.classList.replace('error', 'success') || this.classList.add('success');
        } else {
          el.textContent = '⚠ ' + notFoundMsg;
          el.className   = 'status-badge not-found';
          this.classList.replace('success', 'error') || this.classList.add('error');
        }
      } else {
        el.className   = 'status-badge';
        el.textContent = '';
        this.classList.remove('error', 'success');
      }
    });
  }

  bindLookupInput('location', 'shopName',    () => SHOPS,    v => v.length >= 3 && v.length <= 4, 'ไม่พบรหัสสาขานี้');
  bindLookupInput('jan',      'productName', () => PRODUCTS, v => v.length === 13,                'ไม่พบสินค้าในระบบ');

  document.getElementById('employeeId').addEventListener('input', function () {
    this.value = this.value.replace(/\D/g, '');
  });

  document.getElementById('qty').addEventListener('input', function () {
    if (this.value < 1) this.value = '';
  });

  function addItem() {
    const janInput    = document.getElementById('jan');
    const qtyInput    = document.getElementById('qty');
    const reasonInput = document.getElementById('reason');
    const jan    = janInput.value.trim();
    const qty    = parseInt(qtyInput.value);
    const reason = reasonInput.value.trim();

    if (jan.length !== 13) { showToast('กรุณากรอกรหัส JAN 13 หลักให้ครบ'); janInput.focus(); return; }
    if (!qty || qty < 1)   { showToast('กรุณากรอกจำนวนกล่อง'); qtyInput.focus(); return; }

    const productName = PRODUCTS[jan] || '(ไม่พบชื่อสินค้า)';
    const existing    = orderItems.find(i => i.jan === jan);
    if (existing) {
      existing.qty    = (existing.qty || 0) + qty;
      existing.reason = reason || existing.reason;
      showToast(`อัปเดตจำนวน ${productName} → ${existing.qty} กล่อง`);
    } else {
      orderItems.push({ jan, productName, qty, reason });
      showToast(`เพิ่ม ${productName} ${qty} กล่อง`);
    }
    renderList();

    janInput.value    = '';
    qtyInput.value    = '';
    reasonInput.value = '';
    const pBadge = document.getElementById('productName');
    pBadge.className  = 'status-badge';
    pBadge.textContent = '';
    janInput.classList.remove('success', 'error');
    janInput.focus();
    updateSubmitBtn();
  }

  function deleteItem(index) {
    orderItems.splice(index, 1);
    renderList();
    updateSubmitBtn();
  }

  function renderList() {
    const list = document.getElementById('orderList');
    list.innerHTML = '';
    orderItems.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'order-item';
      div.innerHTML = `
        <span class="item-index">${i + 1}</span>
        <div class="item-info">
          <div class="item-name">${escHtml(item.productName)}</div>
          <div class="item-meta">JAN: ${escHtml(item.jan)}${item.reason ? ' · ' + escHtml(item.reason) : ''}</div>
        </div>
        <div class="item-qty">${item.qty} กล่อง</div>
        <button type="button" class="del-btn" onclick="deleteItem(${i})" title="ลบรายการ">✕</button>
      `;
      list.appendChild(div);
    });
  }

  function resetForm(btn) {
    const locEl    = document.getElementById('location');
    const shopBadge = document.getElementById('shopName');
    locEl.value            = '';
    locEl.classList.remove('success', 'error');
    shopBadge.className    = 'status-badge';
    shopBadge.textContent  = '';
    document.getElementById('employeeId').value = '';
    document.getElementById('trackingNo').value  = '';
    orderItems = [];
    renderList();
    btn.textContent = 'Submit Order';
    updateSubmitBtn();
  }

  async function submitOrder() {
    const locationCode = document.getElementById('location').value.trim();
    const employeeId   = document.getElementById('employeeId').value.trim();

    if (!/^\d{3,4}$/.test(locationCode)) { showToast('กรุณากรอก Location (รหัสร้านค้า) 3-4 หลัก'); document.getElementById('location').focus(); return; }
    if (!/^\d{4,5}$/.test(employeeId))   { showToast('กรุณากรอกรหัสพนักงาน 4-5 หลัก'); document.getElementById('employeeId').focus(); return; }
    if (orderItems.length === 0)          { showToast('กรุณาเพิ่มรายการสินค้าอย่างน้อย 1 รายการ'); return; }

    const shopName = SHOPS[locationCode] || locationCode;
    const btn      = document.getElementById('submitBtn');
    btn.disabled   = true;
    btn.textContent = 'กำลังบันทึก...';

    const trackingNo = document.getElementById('trackingNo').value.trim();
    const payload    = { timestamp: new Date().toISOString(), employeeId, locationCode, shopName, trackingNo, items: orderItems };

    try {
      const url  = `${SCRIPT_URL}?action=submit&data=${encodeURIComponent(JSON.stringify(payload))}`;
      const res  = await fetch(url);
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Script returned failure');
      showToast(`บันทึก Order สำเร็จ! ${json.count} รายการ → ${shopName}`);
      setTimeout(() => resetForm(btn), 1500);
    } catch (err) {
      showToast('เกิดข้อผิดพลาด: ' + err.message);
      console.error('Submit error:', err);
      btn.disabled    = false;
      btn.textContent = 'Submit Order';
    }
  }

  function updateSubmitBtn() {
    document.getElementById('submitBtn').disabled = orderItems.length === 0;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  ['jan', 'qty'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  });

  loadData();
</script>
</body>
</html>
