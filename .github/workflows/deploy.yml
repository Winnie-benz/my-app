name: Auto-deploy to Render

# ยิง Render Deploy Hook ทุกครั้งที่ push เข้า main
# (ใช้แทน webhook เดิมของ Render ที่หลุดไป — GitHub Actions รันแน่นอนทุก push)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "::error::ยังไม่ได้ตั้ง secret RENDER_DEPLOY_HOOK — ไปเพิ่มที่ Settings → Secrets and variables → Actions"
            exit 1
          fi
          curl -fsS -X POST "${RENDER_DEPLOY_HOOK}"
          echo "✅ สั่ง Render deploy แล้ว"
