name: Keep Render awake

# ยิง ping ทุก 10 นาที ช่วงร้านเปิด เพื่อกัน Render free tier หลับ
# (Render หลับหลังไม่มีคนใช้ 15 นาที → เปิดครั้งแรกรอ ~50 วิ)
# เวลาใน cron เป็น UTC — ไทย = UTC+7
# 1-15 UTC = 08:00–22:59 เวลาไทย  (แก้ช่วงเวลาได้ที่บรรทัด cron ด้านล่าง)

on:
  schedule:
    - cron: '*/10 1-15 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app to prevent cold start
        run: |
          code=$(curl -s --max-time 90 -o /dev/null -w "%{http_code}" https://my-app-gjmf.onrender.com/api/health || echo "000")
          echo "ping /api/health -> $code"
          [ "$code" = "200" ] && echo "✅ ตื่นอยู่" || echo "⚠️ ตอบ $code (อาจกำลังตื่นจากหลับ)"
