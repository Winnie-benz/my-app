name: Keep Render awake

# ยิง ping ทุก 14 นาที ช่วงร้านเปิด เพื่อกัน Render free tier หลับ
# (Render หลับหลังไม่มีคนใช้ 15 นาที → 14 นาทีจึงยังปลอดภัย; เปิดครั้งแรกรอ ~50 วิ)
# เวลาใน cron เป็น UTC — ไทย = UTC+7
# 2-13 UTC = ~09:00–21:00 เวลาไทย (ครอบเวลาร้าน 9:30–21:00; แก้ช่วงเวลาได้ที่บรรทัด cron)

on:
  schedule:
    - cron: '*/14 2-13 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app to prevent cold start
        run: |
          code=$(curl -s --max-time 90 -o /dev/null -w "%{http_code}" https://my-app-gjmf.onrender.com/api/health || echo "000")
          echo "ping /api/health -> $code"
          [ "$code" = "200" ] && echo "✅ ตื่นอยู่" || echo "⚠️ ตอบ $code (อาจกำลังตื่นจากหลับ)"
